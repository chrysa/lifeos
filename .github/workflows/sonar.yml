true:
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
  push:
    branches:
    - develop
    - main
    - master
jobs:
  sonar:
    if: ${{ github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
      }}
    name: SonarCloud scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      name: SonarCloud scan
      uses: SonarSource/sonarqube-scan-action@v6
      with:
        args: '-Dsonar.projectKey=chrysa_lifeos -Dsonar.organization=chrysa -Dsonar.projectName=lifeos
          -Dsonar.sources=. -Dsonar.exclusions=**/.git/**,**/reports/**,**/.vscode/**,**/node_modules/**
          -Dsonar.sourceEncoding=UTF-8

          '
    timeout-minutes: 15
name: SonarCloud Analysis
permissions:
  contents: read
  pull-requests: read
