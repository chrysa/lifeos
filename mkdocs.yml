site_name: lifeos — Documentation
site_description: Floating desktop AI assistant — PySide6 overlay, plugin system, multi-provider
site_url: https://chrysa.github.io/lifeos/
repo_url: https://github.com/chrysa/lifeos
repo_name: lifeos
docs_dir: docs
strict: true

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - tables
